services:
  - type: web
    name: piaoji-live-fares
    runtime: docker
    repo: https://github.com/lillly1/piaoji-demo
    branch: main
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
