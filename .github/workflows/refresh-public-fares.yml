name: Refresh public fare snapshot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/scrape_ctrip.py"
      - ".github/workflows/refresh-public-fares.yml"
  schedule:
    - cron: "20 4 * * *"

permissions:
  contents: write

concurrency:
  group: public-fare-snapshot
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch one public route page
        run: python scripts/scrape_ctrip.py
      - name: Commit refreshed snapshot when changed
        run: |
          if git diff --quiet -- data/ctrip-bjs-sha.json; then
            echo "No snapshot change"
            exit 0
          fi
          git config user.name "piaoji-snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ctrip-bjs-sha.json
          git commit -m "data: refresh public fare snapshot"
          git push
