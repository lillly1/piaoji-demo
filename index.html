<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>票迹 · 国内机票比价演示</title>
<meta name="description" content="票迹国内机票比价公开演示版，全部使用模拟数据">
<style>
:root{--ink:#14213d;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--blue2:#1d4ed8;--pale:#eff6ff;--orange:#f97316;--bg:#f5f7fb}
*{box-sizing:border-box}body{margin:0;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--bg)}
button,input,select{font:inherit}button{cursor:pointer}.top-alert{background:#fff7ed;color:#9a3412;text-align:center;padding:9px 16px;font-size:13px;border-bottom:1px solid #fed7aa}
header{background:#fff;border-bottom:1px solid var(--line)}.nav{max-width:1180px;margin:auto;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.brand{display:flex;gap:10px;align-items:center;font-weight:800;font-size:22px}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:grid;place-items:center;color:white}
.sub{font-size:13px;color:var(--muted);font-weight:400}.hero{background:linear-gradient(120deg,#172554,#1d4ed8);padding:34px 20px 54px;color:white}.hero-inner{max-width:1180px;margin:auto}
h1{font-size:32px;margin:0 0 8px}.hero p{margin:0 0 24px;color:#dbeafe}.search{display:grid;grid-template-columns:1.2fr 48px 1.2fr 1fr .7fr auto;gap:10px;background:white;padding:14px;border-radius:16px;box-shadow:0 16px 45px #0f172a4d}
.field{position:relative}.field label{display:block;color:var(--muted);font-size:11px;margin:0 0 5px 3px}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--ink);background:#fff}
.swap{align-self:end;height:42px;border:1px solid #bfdbfe;background:var(--pale);color:var(--blue);border-radius:10px}.search-btn{align-self:end;height:42px;border:0;background:var(--orange);color:white;font-weight:700;border-radius:10px;padding:0 24px}
.layout{max-width:1180px;margin:-26px auto 50px;display:grid;grid-template-columns:240px 1fr;gap:18px;padding:0 20px}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 5px 20px #1f29370a}
.filters{padding:18px;height:max-content}.filters h3{margin:0 0 16px}.filter-group{border-top:1px solid var(--line);padding:16px 0}.filter-group:first-of-type{border:0;padding-top:4px}.filter-title{font-size:13px;font-weight:700;margin-bottom:10px}.check{display:flex;align-items:center;gap:8px;font-size:13px;margin:9px 0;color:#374151}.check input{accent-color:var(--blue)}
.range{display:grid;grid-template-columns:1fr 1fr;gap:7px}.range input{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px}.reset{width:100%;border:1px solid #bfdbfe;background:white;color:var(--blue);padding:9px;border-radius:9px}
.results-head{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.results-head strong{font-size:17px}.sorts{display:flex;gap:5px;flex-wrap:wrap}.sort{border:0;background:transparent;color:var(--muted);padding:8px 10px;border-radius:8px}.sort.active{background:var(--pale);color:var(--blue);font-weight:700}
.flight{margin-bottom:12px;overflow:hidden}.flight-main{display:grid;grid-template-columns:1.25fr 1.4fr .8fr auto;align-items:center;gap:18px;padding:20px}.airline{display:flex;align-items:center;gap:11px}.airline-badge{width:38px;height:38px;border-radius:50%;background:#e0f2fe;color:#0369a1;display:grid;place-items:center;font-weight:800}.airline small,.airport,.meta{color:var(--muted);font-size:12px}
.route{display:grid;grid-template-columns:1fr 90px 1fr;align-items:center;text-align:center}.time{font-size:25px;font-weight:800}.line{height:1px;background:#94a3b8;position:relative}.line:after{content:"✈";position:absolute;right:-5px;top:-10px;color:var(--blue)}.duration{font-size:11px;color:var(--muted);margin-bottom:5px}.price{text-align:right}.price span{color:var(--orange);font-weight:800;font-size:25px}.price small{color:var(--muted)}.quotes-btn{border:1px solid #93c5fd;background:var(--pale);color:var(--blue2);padding:10px 13px;border-radius:9px;font-weight:700}
.quotes{display:none;border-top:1px solid var(--line);background:#fafcff;padding:5px 20px 14px}.quotes.open{display:block}.quote{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;padding:12px 4px;border-bottom:1px dashed var(--line);gap:12px}.quote:last-child{border:0}.quote-price{color:var(--orange);font-weight:800}.buy{border:0;background:var(--blue);color:#fff;padding:8px 14px;border-radius:8px}.best{font-size:11px;background:#dcfce7;color:#15803d;padding:3px 6px;border-radius:5px;margin-left:6px}
.empty{display:none;padding:60px;text-align:center;color:var(--muted)}footer{text-align:center;color:var(--muted);font-size:12px;padding:10px 20px 40px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:12px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:9}.toast.show{opacity:1;transform:translateX(-50%)}
.mobile-filter{display:none}
@media(max-width:820px){.nav .sub{display:none}.hero{padding-top:24px}.hero h1{font-size:26px}.search{grid-template-columns:1fr 42px 1fr}.search .date,.search .people{grid-column:span 1}.search-btn{grid-column:1/-1}.layout{grid-template-columns:1fr;margin-top:-20px}.filters{display:none}.filters.mobile-open{display:block}.mobile-filter{display:inline-block;border:1px solid var(--line);background:#fff;padding:8px 10px;border-radius:8px}.results-head{align-items:flex-start;gap:12px;flex-direction:column}.flight-main{grid-template-columns:1fr auto;gap:15px}.route{grid-column:1/-1;grid-row:2}.meta{display:none}.price{grid-column:1}.quotes-btn{grid-column:2}.quote{grid-template-columns:1fr auto}.quote-price{grid-column:1}.buy{grid-column:2;grid-row:1/3}.sorts{width:100%;overflow:auto}.sort{white-space:nowrap}}
@media(max-width:520px){.search{grid-template-columns:1fr 36px 1fr;padding:10px;gap:7px}.field input,.field select{padding:9px 8px}.date,.people{grid-column:span 3!important}.layout{padding:0 10px}.route{grid-template-columns:1fr 65px 1fr}.flight-main{padding:16px}.time{font-size:22px}.hero{padding-left:14px;padding-right:14px}.nav{padding:0 14px}}
</style>
</head>
<body>
<div class="top-alert">演示数据，实际价格以平台为准 · 本页面不会要求下载或安装任何软件</div>
<header><div class="nav"><div class="brand"><span class="logo">迹</span>票迹 <span class="sub">一站比价，轻松出发</span></div><span class="sub">国内机票公开演示版</span></div></header>
<section class="hero"><div class="hero-inner"><h1>找到更合适的那张机票</h1><p>一次搜索，多平台比价。以下航班与价格均为模拟数据。</p>
<form class="search" id="searchForm">
<div class="field"><label>出发城市</label><select id="from"><option>上海</option><option>北京</option><option>广州</option><option>深圳</option><option>成都</option></select></div>
<button type="button" class="swap" id="swap" aria-label="交换城市">⇄</button>
<div class="field"><label>到达城市</label><select id="to"><option>北京</option><option>上海</option><option>广州</option><option>深圳</option><option>成都</option></select></div>
<div class="field date"><label>出发日期</label><input id="date" type="date" value="2026-08-08"></div>
<div class="field people"><label>乘机人数</label><select id="people"><option value="1">1 位</option><option value="2">2 位</option><option value="3">3 位</option><option value="4">4 位</option></select></div>
<button class="search-btn">搜索航班</button></form></div></section>
<main class="layout">
<aside class="panel filters" id="filters"><h3>筛选条件</h3>
<div class="filter-group"><div class="filter-title">航空公司</div>
<label class="check"><input type="checkbox" name="airline" value="中国国航"> 中国国航</label><label class="check"><input type="checkbox" name="airline" value="东方航空"> 东方航空</label><label class="check"><input type="checkbox" name="airline" value="南方航空"> 南方航空</label><label class="check"><input type="checkbox" name="airline" value="海南航空"> 海南航空</label></div>
<div class="filter-group"><div class="filter-title">起飞时段</div><label class="check"><input type="checkbox" name="period" value="morning"> 上午 06:00–12:00</label><label class="check"><input type="checkbox" name="period" value="afternoon"> 下午 12:00–18:00</label><label class="check"><input type="checkbox" name="period" value="evening"> 晚间 18:00–24:00</label></div>
<div class="filter-group"><div class="filter-title">出发机场</div><label class="check"><input type="checkbox" name="airport" value="浦东"> 浦东国际机场</label><label class="check"><input type="checkbox" name="airport" value="虹桥"> 虹桥国际机场</label></div>
<div class="filter-group"><div class="filter-title">单人价格区间</div><div class="range"><input id="minPrice" type="number" value="0" min="0" aria-label="最低价"><input id="maxPrice" type="number" value="2000" min="0" aria-label="最高价"></div></div>
<button class="reset" id="reset">重置筛选</button></aside>
<section><div class="panel results-head"><div><button class="mobile-filter" id="filterToggle">筛选</button> <strong id="summary">上海 → 北京 · 4 个航班</strong></div><div class="sorts"><button class="sort active" data-sort="recommend">推荐</button><button class="sort" data-sort="price">最低价格</button><button class="sort" data-sort="depart">最早出发</button><button class="sort" data-sort="duration">最短耗时</button></div></div><div id="flights"></div><div class="panel empty" id="empty">没有符合条件的航班，请调整筛选条件。</div></section>
</main><footer>© 2026 票迹演示版 · 全部航班与报价均为模拟数据 · 实际价格与服务以各平台为准</footer><div class="toast" id="toast"></div>
<script>
const data=[
{id:1,airline:'东方航空',code:'MU5103',logo:'东',depart:'07:25',arrive:'09:40',duration:135,fromAirport:'虹桥 T2',toAirport:'首都 T2',price:620,score:98,quotes:[['航司官网',620],['飞猪',635],['携程',648],['同程',655]]},
{id:2,airline:'中国国航',code:'CA1508',logo:'国',depart:'09:10',arrive:'11:20',duration:130,fromAirport:'虹桥 T2',toAirport:'首都 T3',price:580,score:95,quotes:[['同程',580],['航司官网',596],['携程',608],['飞猪',615]]},
{id:3,airline:'南方航空',code:'CZ8889',logo:'南',depart:'14:20',arrive:'16:45',duration:145,fromAirport:'浦东 T2',toAirport:'大兴',price:545,score:92,quotes:[['飞猪',545],['携程',558],['航司官网',570],['同程',579]]},
{id:4,airline:'海南航空',code:'HU7604',logo:'海',depart:'19:05',arrive:'21:10',duration:125,fromAirport:'浦东 T1',toAirport:'首都 T2',price:690,score:88,quotes:[['携程',690],['同程',702],['航司官网',715],['飞猪',719]]}
];
let sort='recommend';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
function mins(t){const [h,m]=t.split(':').map(Number);return h*60+m}
function selected(n){return $$('input[name="'+n+'"]:checked').map(x=>x.value)}
function period(t){let h=+t.slice(0,2);return h<12?'morning':h<18?'afternoon':'evening'}
function money(n){return '¥'+n}
function render(){
 const airlines=selected('airline'),periods=selected('period'),airports=selected('airport'),min=+$('#minPrice').value||0,max=+$('#maxPrice').value||99999;
 let rows=data.filter(f=>(!airlines.length||airlines.includes(f.airline))&&(!periods.length||periods.includes(period(f.depart)))&&(!airports.length||airports.some(a=>f.fromAirport.includes(a)))&&f.price>=min&&f.price<=max);
 rows.sort((a,b)=>sort==='price'?a.price-b.price:sort==='depart'?mins(a.depart)-mins(b.depart):sort==='duration'?a.duration-b.duration:b.score-a.score);
 $('#summary').textContent=$('#from').value+' → '+$('#to').value+' · '+rows.length+' 个航班';
 $('#empty').style.display=rows.length?'none':'block';
 $('#flights').innerHTML=rows.map(f=>`<article class="panel flight"><div class="flight-main"><div class="airline"><span class="airline-badge">${f.logo}</span><div><b>${f.airline}</b><br><small>${f.code} · 经济舱</small></div></div><div class="route"><div><div class="time">${f.depart}</div><div class="airport">${f.fromAirport}</div></div><div><div class="duration">${Math.floor(f.duration/60)}小时${f.duration%60}分</div><div class="line"></div><div class="duration">直飞</div></div><div><div class="time">${f.arrive}</div><div class="airport">${f.toAirport}</div></div></div><div class="meta">含税价<br>免费行李额 20kg</div><div class="price"><small>每人起</small><br><span>${money(f.price)}</span></div><button class="quotes-btn" onclick="toggleQuotes(${f.id},this)">查看 4 个报价</button></div><div class="quotes" id="q${f.id}">${f.quotes.map((q,i)=>`<div class="quote"><div><b>${q[0]}</b>${i===0?'<span class="best">最低价</span>':''}<br><small>退改规则以平台为准</small></div><div class="quote-price">${money(q[1])}</div><button class="buy" onclick="buy('${q[0]}')">模拟购买</button></div>`).join('')}</div></article>`).join('');
}
window.toggleQuotes=(id,btn)=>{const q=$('#q'+id),open=q.classList.toggle('open');btn.textContent=open?'收起报价':'查看 4 个报价'};
window.buy=p=>{show('演示操作：即将前往 '+p+'（未发生真实跳转）')};
function show(t){const x=$('#toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),2600)}
$('#searchForm').addEventListener('submit',e=>{e.preventDefault();if($('#from').value===$('#to').value){show('出发城市和到达城市不能相同');return}render();show('已更新 '+$('#people').value+' 位乘客的模拟航班')});
$('#swap').onclick=()=>{let x=$('#from').value;$('#from').value=$('#to').value;$('#to').value=x;render()};
$$('.sort').forEach(b=>b.onclick=()=>{$$('.sort').forEach(x=>x.classList.remove('active'));b.classList.add('active');sort=b.dataset.sort;render()});
$$('#filters input').forEach(x=>x.addEventListener('change',render));
$('#reset').onclick=()=>{$$('#filters input[type=checkbox]').forEach(x=>x.checked=false);$('#minPrice').value=0;$('#maxPrice').value=2000;render()};
$('#filterToggle').onclick=()=>$('#filters').classList.toggle('mobile-open');
render();
</script></body></html>
