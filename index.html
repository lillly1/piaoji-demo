<div class="top-alert">演示数据，实际价格以平台为准 · 本页面不会要求下载或安装任何软件</div>
<header><div class="nav"><div class="brand"><span class="logo">迹</span>票迹 <span class="sub">一站比价，轻松出发</span></div><span class="sub">国内机票公开演示版</span></div></header>
<section class="hero"><div class="hero-inner"><h1>找到更合适的那张机票</h1><p>覆盖全国民航城市，一次搜索比较携程、飞猪、同程、去哪儿与航司官网模拟报价。</p>
<div class="trip-tabs"><button class="trip-tab active" data-trip="oneway">单程</button><button class="trip-tab" data-trip="roundtrip">往返</button></div>
<form class="search" id="searchForm"><div class="field"><label>出发城市</label><input id="from" list="cities" value="上海" autocomplete="off"></div><button type="button" class="swap" id="swap" aria-label="交换城市">⇄</button><div class="field"><label>到达城市</label><input id="to" list="cities" value="北京" autocomplete="off"></div><div class="field date"><label>出发日期</label><input id="date" type="date" value="2026-08-08"></div><div class="field return-date hidden" id="returnWrap"><label>返程日期</label><input id="returnDate" type="date" value="2026-08-12"></div><div class="field people"><label>乘机人数</label><select id="people"><option value="1">1 位</option><option value="2">2 位</option><option value="3">3 位</option><option value="4">4 位</option><option value="5">5 位</option><option value="6">6 位</option><option value="7">7 位</option><option value="8">8 位</option><option value="9">9 位</option></select></div><button class="search-btn">搜索航班</button></form>
<datalist id="cities"></datalist></div></section>
<main class="layout"><aside class="panel filters" id="filters"><h3>筛选条件</h3><div class="filter-group"><div class="filter-title">航空公司</div><label class="check"><input type="checkbox" name="airline" value="中国国航"> 中国国航</label><label class="check"><input type="checkbox" name="airline" value="东方航空"> 东方航空</label><label class="check"><input type="checkbox" name="airline" value="南方航空"> 南方航空</label><label class="check"><input type="checkbox" name="airline" value="海南航空"> 海南航空</label></div><div class="filter-group"><div class="filter-title">起飞时段</div><label class="check"><input type="checkbox" name="period" value="morning"> 上午 06:00–12:00</label><label class="check"><input type="checkbox" name="period" value="afternoon"> 下午 12:00–18:00</label><label class="check"><input type="checkbox" name="period" value="evening"> 晚间 18:00–24:00</label></div><div class="filter-group"><div class="filter-title">机场</div><label class="check"><input type="checkbox" name="airport" value="主机场"> 城市主机场</label><label class="check"><input type="checkbox" name="airport" value="第二机场"> 城市第二机场</label></div><div class="filter-group"><div class="filter-title">单人价格区间</div><div class="range"><input id="minPrice" type="number" value="0" min="0" aria-label="最低价"><input id="maxPrice" type="number" value="3000" min="0" aria-label="最高价"></div></div><button class="reset" id="reset">重置筛选</button></aside>
<section><div class="panel results-head"><div><button class="mobile-filter" id="filterToggle">筛选</button> <strong id="summary"></strong><div class="route-note" id="routeNote"></div></div><div class="sorts"><button class="sort active" data-sort="recommend">推荐</button><button class="sort" data-sort="price">最低价格</button><button class="sort" data-sort="depart">最早出发</button><button class="sort" data-sort="duration">最短耗时</button></div></div><div id="flights"></div><div class="panel empty" id="empty">没有符合条件的航班，请调整筛选条件。</div></section></main>
<footer>© 2026 票迹演示版 · 全部航班与报价均为模拟数据 · 实际价格与服务以各平台为准</footer><div class="watermark" aria-label="LilyFeng watermark"><span class="watermark-mark">LF</span>LilyFeng</div><div class="toast" id="toast"></div>
<script>
const cities=['北京','上海','天津','重庆','广州','深圳','珠海','佛山','惠州','梅州','揭阳','汕头','湛江','韶关','南宁','桂林','柳州','北海','梧州','百色','河池','海口','三亚','琼海','儋州','成都','绵阳','宜宾','泸州','西昌','攀枝花','达州','广元','南充','稻城','九寨沟','贵阳','遵义','安顺','兴义','毕节','六盘水','昆明','丽江','大理','西双版纳','腾冲','芒市','香格里拉','普洱','临沧','昭通','保山','武汉','宜昌','襄阳','恩施','十堰','荆州','长沙','张家界','衡阳','常德','岳阳','怀化','郑州','洛阳','南阳','信阳','安阳','商丘','济南','青岛','烟台','威海','临沂','潍坊','济宁','东营','菏泽','日照','南京','无锡','常州','南通','徐州','扬州','盐城','淮安','连云港','杭州','宁波','温州','义乌','台州','舟山','衢州','南昌','赣州','景德镇','井冈山','宜春','上饶','福州','厦门','泉州','武夷山','龙岩','三明','合肥','黄山','阜阳','安庆','池州','芜湖','太原','大同','运城','长治','吕梁','临汾','五台山','石家庄','秦皇岛','唐山','邯郸','张家口','承德','邢台','哈尔滨','齐齐哈尔','牡丹江','佳木斯','大庆','伊春','漠河','鸡西','黑河','长春','延吉','白山','通化','松原','沈阳','大连','丹东','锦州','鞍山','营口','朝阳','西安','榆林','延安','汉中','安康','兰州','敦煌','嘉峪关','张掖','天水','庆阳','陇南','西宁','格尔木','玉树','银川','中卫','固原','乌鲁木齐','喀什','伊宁','库尔勒','阿克苏','和田','吐鲁番','克拉玛依','哈密','阿勒泰','塔城','石河子','拉萨','林芝','日喀则','昌都','阿里','呼和浩特','包头','鄂尔多斯','赤峰','海拉尔','满洲里','通辽','乌兰浩特','锡林浩特','巴彦淖尔','乌海','澳门','香港','台北','高雄','台中','花莲'];
document.querySelector('#cities').innerHTML=cities.map(c=>'<option value="'+c+'"></option>').join('');
const flights=[
{id:1,airline:'东方航空',code:'MU5103',logo:'东',depart:'07:25',arrive:'09:40',duration:135,airport:'主机场',price:620,score:98,quotes:[['航司官网',620],['去哪儿',628],['飞猪',635],['携程',648],['同程',655]]},
{id:2,airline:'中国国航',code:'CA1508',logo:'国',depart:'09:10',arrive:'11:20',duration:130,airport:'第二机场',price:580,score:95,quotes:[['去哪儿',580],['同程',586],['航司官网',596],['携程',608],['飞猪',615]]},
{id:3,airline:'南方航空',code:'CZ8889',logo:'南',depart:'14:20',arrive:'16:45',duration:145,airport:'主机场',price:545,score:92,quotes:[['飞猪',545],['去哪儿',550],['携程',558],['航司官网',570],['同程',579]]},
{id:4,airline:'海南航空',code:'HU7604',logo:'海',depart:'19:05',arrive:'21:10',duration:125,airport:'第二机场',price:690,score:88,quotes:[['携程',690],['去哪儿',696],['同程',702],['航司官网',715],['飞猪',719]]}
];
let sort='recommend',trip='oneway';const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];const mins=t=>{const [h,m]=t.split(':').map(Number);return h*60+m};const selected=n=>$$('input[name="'+n+'"]:checked').map(x=>x.value);const period=t=>+t.slice(0,2)<12?'morning':+t.slice(0,2)<18?'afternoon':'evening';const money=n=>'¥'+n;
function airportName(city,type){const special={北京:['首都 T3','大兴'],上海:['虹桥 T2','浦东 T2'],成都:['双流 T2','天府 T2'],重庆:['江北 T3','江北 T2'],广州:['白云 T2','白云 T1'],深圳:['宝安 T3','宝安卫星厅'],昆明:['长水','长水'],西安:['咸阳 T3','咸阳 T2'],杭州:['萧山 T4','萧山 T3'],南京:['禄口 T2','禄口 T1']};return special[city]?.[type==='第二机场'?1:0]||city+(type==='第二机场'?'第二机场':'机场')+' T2'}
function render(){const airlines=selected('airline'),periods=selected('period'),airports=selected('airport'),min=+$('#minPrice').value||0,max=+$('#maxPrice').value||99999;let rows=flights.filter(f=>(!airlines.length||airlines.includes(f.airline))&&(!periods.length||periods.includes(period(f.depart)))&&(!airports.length||airports.includes(f.airport))&&f.price>=min&&f.price<=max);rows.sort((a,b)=>sort==='price'?a.price-b.price:sort==='depart'?mins(a.depart)-mins(b.depart):sort==='duration'?a.duration-b.duration:b.score-a.score);const from=$('#from').value,to=$('#to').value;$('#summary').textContent=from+' → '+to+' · '+rows.length+' 个去程航班';$('#routeNote').textContent=trip==='roundtrip'?$('#date').value+' 出发 · '+$('#returnDate').value+' 返回 · 往返模拟总价按两程计算':$('#date').value+' 出发 · 单程';$('#empty').style.display=rows.length?'none':'block';$('#flights').innerHTML=rows.map(f=>{const shown=trip==='roundtrip'?f.price*2:f.price;return '<article class="panel flight"><div class="flight-main"><div class="airline"><span class="airline-badge">'+f.logo+'</span><div><b>'+f.airline+'</b><br><small>'+f.code+' · 经济舱</small></div></div><div class="route"><div><div class="time">'+f.depart+'</div><div class="airport">'+airportName(from,f.airport)+'</div></div><div><div class="duration">'+Math.floor(f.duration/60)+'小时'+f.duration%60+'分</div><div class="line"></div><div class="duration">直飞</div></div><div><div class="time">'+f.arrive+'</div><div class="airport">'+airportName(to,'主机场')+'</div></div></div><div class="meta">'+(trip==='roundtrip'?'往返含税':'单程含税')+'<br>免费行李额 20kg</div><div class="price"><small>每人'+(trip==='roundtrip'?'往返':'单程')+'起</small><br><span>'+money(shown)+'</span></div><button class="quotes-btn" onclick="toggleQuotes('+f.id+',this)">查看 5 个报价</button></div><div class="quotes" id="q'+f.id+'">'+f.quotes.map((q,i)=>'<div class="quote"><div><b>'+q[0]+'</b>'+(i===0?'<span class="best">最低价</span>':'')+'<br><small>退改规则以平台为准</small></div><div class="quote-price">'+money(trip==='roundtrip'?q[1]*2:q[1])+'</div><button class="buy" onclick="buy(\''+q[0]+'\')">模拟购买</button></div>').join('')+'</div></article>'}).join('')}
window.toggleQuotes=(id,btn)=>{const q=$('#q'+id),open=q.classList.toggle('open');btn.textContent=open?'收起报价':'查看 5 个报价'};window.buy=p=>show('演示操作：即将前往 '+p+'（未发生真实跳转）');function show(t){const x=$('#toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),2600)}
$$('.trip-tab').forEach(b=>b.onclick=()=>{$$('.trip-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');trip=b.dataset.trip;$('#returnWrap').classList.toggle('hidden',trip!=='roundtrip');render()});
$('#searchForm').addEventListener('submit',e=>{e.preventDefault();if(!cities.includes($('#from').value)||!cities.includes($('#to').value)){show('请从全国城市列表中选择城市');return}if($('#from').value===$('#to').value){show('出发城市和到达城市不能相同');return}if(trip==='roundtrip'&&$('#returnDate').value<=$('#date').value){show('返程日期必须晚于出发日期');return}render();show('已更新 '+$('#people').value+' 位乘客的'+(trip==='roundtrip'?'往返':'单程')+'模拟航班')});
$('#swap').onclick=()=>{let x=$('#from').value;$('#from').value=$('#to').value;$('#to').value=x;render()};$$('.sort').forEach(b=>b.onclick=()=>{$$('.sort').forEach(x=>x.classList.remove('active'));b.classList.add('active');sort=b.dataset.sort;render()});$$('#filters input').forEach(x=>x.addEventListener('change',render));$('#reset').onclick=()=>{$$('#filters input[type=checkbox]').forEach(x=>x.checked=false);$('#minPrice').value=0;$('#maxPrice').value=3000;render()};$('#filterToggle').onclick=()=>$('#filters').classList.toggle('mobile-open');render();
</script></body></html>
